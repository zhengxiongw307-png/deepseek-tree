<!DOCTYPE html><!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>贪吃蛇 - 亮度渐变·可反向</title>

<meta name="x5-fullscreen" content="true">

<meta name="x5-page-mode" content="app">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

/* ==========================================

   新增门道：全屏 App 启动引导遮罩样式

   ========================================== */

#app-launcher-overlay {

  position: fixed;

  top: 0; left: 0; width: 100vw; height: 100vh;

  background: #111111;: #111111;: #111111;: #111111;

  z-index: 99999;

  display: flex;

  flex-direction: column;

  align-items: center;

  justify-content: center;

  color: #fff;

  font-family: "Microsoft Yahei", sans-serif;

}

.launch-btn {

  background: #165DFF;

  color: #fff;

  border: none;

  padding: 15px 40px;

  font-size: 16px;

  font-weight: bold;

  border-radius: 30px;

  cursor: pointer;

  box-shadow: 0 4px 15px rgba(22, 93, 255, 0.4);

  margin-top: 20px;

  transition: transform 0.2s;

}

.launch-btn:active { transform: scale(0.95); }



/* 原有样式与移动端优化 */

* {

  -webkit-user-select: none;

  -webkit-touch-callout: none;

  -webkit-tap-highlight-color: rgba(0,0,0,0);

}

html, body {

  margin: 0;

  padding: 0;

  width: 100%;

  height: 100%;

  overflow: hidden; 

  background: #111;

  overscroll-behavior-y: contain; 

}

body {

  font-family: "Microsoft Yahei", sans-serif;

  display: flex;

  flex-direction: column;

  align-items: center;

  justify-content: center; 

  color: #fff;

  box-sizing: border-box;

  padding: 10px;

}

h2 { margin: 0 0 10px; font-size: 20px; }

.btns { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

.btn {

  padding: 10px 16px; 

  border: none;

  border-radius: 8px;

  background: #165DFF;

  color: #fff;

  font-size: 14px;

  cursor: pointer;

}

.btn:active { background: #0e4bd9; } 



#game {

  border: 3px solid #444;

  background: #000;

  display: grid;

  grid-template-columns: repeat(20, 4.5vw); 

  position: relative;

}

.cell { width: 4.5vw; height: 4.5vw; }

.food { background: #ff3333; border-radius: 50%; }



#restart {

  display: none;

  position: absolute;

  top: 50%; left: 50%;

  transform: translate(-50%, -50%);

  padding: 15px 30px;

  background: #ff4444;

  color: #fff;

  font-size: 20px;

  border: none;

  border-radius: 10px;

  cursor: pointer;

  z-index: 10;

}

.score { font-size: 18px; margin: 15px 0 5px; }

.tip { font-size: 12px; color: #aaa; margin-top: 5px; }

   /* 当浏览器全屏，且系统强行进入【横屏】时 */
/* ==========================================
   终极完美版：只有当【系统硬要横屏】时才旋转，微信竖屏全屏不触发
   ========================================== */
@media (orientation: landscape) and (max-width: 1024px) {
  /* 门道：利用 HTML 的全屏伪类，只有真正触发了系统级全屏才允许旋转 */
  :fullscreen body, 
  :-webkit-full-screen body {
    transform: rotate(-90deg);
    transform-origin: left top;
    width: 100vh !important;
    height: 100vw !important;
    position: absolute;
    top: 100%;
    left: 0;
  }
  
  :fullscreen #game,
  :-webkit-full-screen #game {
    grid-template-columns: repeat(20, 4.5vh);
  }
  :fullscreen .cell,
  :-webkit-full-screen .cell { 
    width: 4.5vh; height: 4.5vh; 
  }
}

</style>

</head>

<body>



<div id="app-launcher-overlay">

  <h3 style="margin:0; font-size:22px; letter-spacing:1px;">创意渐变贪吃蛇</h3>

  <p style="color:#666; font-size:13px; margin:5px 0 15px;">点击启动进入全屏沉浸模式</p>

  <button class="launch-btn" onclick="launchInFullscreen()">启动游戏 App</button>

</div>



<h2>贪吃蛇（独立应用版）</h2>

<div class="btns">

  <button class="btn" onclick="start(180,'endless')">无尽·慢</button>

  <button class="btn" onclick="start(80,'endless')">无尽·快</button>

  <button class="btn" onclick="start(180,'life')">生命·慢</button>

  <button class="btn" onclick="start(80,'life')">生命·快</button>

</div>

<div id="game">

  <button id="restart">重新开始</button>

</div>

<div class="score">分数：<span id="score">0</span></div>

<div class="tip">提示：在游戏区域内【任意方向滑动】控制蛇的移动</div>



<script>

// ==========================================

// 新增核心：利用点击手势权限，强行把网页撑满全屏

// ==========================================

function launchInFullscreen() {

  const docEl = document.documentElement;

  

  if (docEl.requestFullscreen) { docEl.requestFullscreen(); } 

  else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen(); } 

  else if (docEl.msRequestFullscreen) { docEl.msRequestFullscreen(); }



  // 隐藏启动页，露出游戏

  document.getElementById("app-launcher-overlay").style.display = "none";

}



const size = 20;

let snake, food, dir, nextDir, score, loop;

let speed = 180, mode = 'endless';

const restartBtn = document.getElementById('restart');



function init() {

  clearInterval(loop);

  restartBtn.style.display = 'none';

  const game = document.getElementById('game');

  game.querySelectorAll('.cell').forEach(c => c.remove());

  for (let y = 0; y < size; y++) {

    for (let x = 0; x < size; x++) {

      const d = document.createElement('div');

      d.className = 'cell';

      d.dataset.x = x;

      d.dataset.y = y;

      game.appendChild(d);

    }

  }

  const cx = Math.floor(size/2), cy = Math.floor(size/2);

  snake = [

    {x: cx-1, y: cy},

    {x: cx, y: cy},

    {x: cx+1, y: cy},

    {x: cx+2, y: cy}

  ];

  dir = nextDir = 'right';

  score = 0;

  document.getElementById('score').textContent = score;

  randFood();

  draw();

}



function randFood() {

  let f;

  do {

    f = {

      x: Math.floor(Math.random() * size),

      y: Math.floor(Math.random() * size)

    };

  } while (snake.some(s => s.x === f.x && s.y === f.y));

  food = f;

}



function draw() {

  document.querySelectorAll('.cell').forEach(c => {

    c.style.background = '';

    c.classList.remove('food');

  });

  const len = snake.length;

  snake.forEach((s, i) => {

    const bright = Math.floor(80 + (i / len) * 155);

    const cell = document.querySelector(`[data-x="s.x"][data−y="{s.y}"]`);

    if (cell) cell.style.background = `rgb(0, ${bright}, 0)`;

  });

  const f = document.querySelector(`[data-x="food.x"][data−y="{food.y}"]`);

  if (f) f.classList.add('food');

}



function move() {

  dir = nextDir;

  const head = {...snake[snake.length-1]};

  switch (dir) {

    case 'up': head.y--; break;

    case 'down': head.y++; break;

    case 'left': head.x--; break;

    case 'right': head.x++; break;

  }



  if (mode === 'endless') {

    if (head.x < 0) head.x = size - 1;

    if (head.x >= size) head.x = 0;

    if (head.y < 0) head.y = size - 1;

    if (head.y >= size) head.y = 0;

  }



  let dead = false;

  if (mode === 'life') {

    if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size) {

      dead = true;

    }

  }



  if (dead) {

    clearInterval(loop);

    restartBtn.style.display = 'block';

    return;

  }



  snake.push(head);

  if (head.x === food.x && head.y === food.y) {

    score += 10;

    document.getElementById('score').textContent = score;

    randFood();

  } else {

    snake.shift();

  }

  draw();

}



document.addEventListener('keydown', e => {

  if (e.key === 'ArrowUp') nextDir = 'up';

  if (e.key === 'ArrowDown') nextDir = 'down';

  if (e.key === 'ArrowLeft') nextDir = 'left';

  if (e.key === 'ArrowRight') nextDir = 'right';

});



// 手机端全屏滑屏手势控制

let touchStartX = 0;

let touchStartY = 0;

const gameContainer = document.getElementById('game');



gameContainer.addEventListener('touchstart', e => {

  touchStartX = e.touches[0].clientX;

  touchStartY = e.touches[0].clientY;

}, { passive: true });



gameContainer.addEventListener('touchmove', e => {

  if (!touchStartX || !touchStartY) return;



  let touchEndX = e.touches[0].clientX;

  let touchEndY = e.touches[0].clientY;



  let diffX = touchEndX - touchStartX;

  let diffY = touchEndY - touchStartY;

  

  if (Math.abs(diffX) > 30 || Math.abs(diffY) > 30) {

    if (Math.abs(diffX) > Math.abs(diffY)) {

      nextDir = diffX > 0 ? 'right' : 'left';

    } else {

      nextDir = diffY > 0 ? 'down' : 'up';

    }

    touchStartX = touchEndX;

    touchStartY = touchEndY;

  }

}, { passive: true });



function start(sp, md) {

  speed = sp;

  mode = md;

  init();

  loop = setInterval(move, speed);

}

restartBtn.onclick = () => start(speed, mode);

</script>

</body>

</html>
